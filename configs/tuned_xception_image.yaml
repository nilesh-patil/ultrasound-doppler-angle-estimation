name: tuned_xception_image
seed: 42
era: replication
backbone:
  name: xception
  weights: imagenet
  trainable: false
  pooling: grid2
head:
  hidden_units:
  - 512
  - 128
  dropout: 0.24391994623453728
  batchnorm: false
  activation: relu
  final_activation: linear
  l2: 0.0027286459577390235
target:
  kind: raw
data:
  images_dir: data/images
  labels_csv: data/labels.csv
  rotation_min_deg: -60
  rotation_max_deg: 60
  rotation_step_deg: 5
  rotation_mode: reflect
  clahe: true
  clahe_backend: skimage
  clahe_clip_limit: 0.03
  normalize: true
  wrap_0_180: true
  flip_h: false
  flip_v: false
  gamma_jitter: 0.0
  translate_frac: 0.0
  speckle_std: 0.0
split:
  strategy: augmented
  test_size: 0.2
  n_folds: null
  seed: 42
train:
  optimizer: adam
  lr: 0.0005192503148445923
  loss: mse
  epochs: 60
  batch_size: 16
  early_stopping_patience: 10
  monitor: val_mae
  mc_samples: 0
