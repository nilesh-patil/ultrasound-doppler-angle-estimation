# Frozen replication, orientation-preserving grid pooling — DenseNet201 (best: ~6.3% MAPE).
# grid3 = avg-pool conv maps to ~3x3 then flatten; keeps the spatial layout that
# encodes vessel orientation (global avg-pool discards it). Augmented = paper protocol.
name: replication_densenet201
era: replication
seed: 42
backbone:
  name: densenet201
  weights: imagenet
  trainable: false
  pooling: grid3
head:
  hidden_units: [256]
  dropout: 0.5
  batchnorm: true
  l2: 0.0
  final_activation: linear
target:
  kind: raw
split:
  strategy: augmented
  test_size: 0.2
  seed: 42
train:
  lr: 0.0001
  loss: mse
  epochs: 150
  batch_size: 32
  early_stopping_patience: 15
  monitor: val_mae
