name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: test (linux-64, JAX-CPU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: default
          cache: true
      - name: Run test suite
        run: pixi run -e default test
